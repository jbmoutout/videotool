# IMPORTANT: keep as "vodtool-api" — this is the deployed Cloudflare Worker name.
# Changing it would create a new worker instead of updating the existing one.
name = "vodtool-api"
main = "src/worker.js"
compatibility_date = "2024-12-01"

[vars]
# Set these via `wrangler secret put GROQ_API_KEY` and `wrangler secret put ANTHROPIC_API_KEY`
# Never commit actual keys here.
RATE_LIMIT_PER_DAY = "10"

[observability]
[observability.logs]
enabled = false
invocation_logs = true

# KV namespace for IP-based rate limiting.
# Create it first: wrangler kv namespace create RATE_LIMITS
# Then paste the id below.
[[kv_namespaces]]
binding = "RATE_LIMITS"
id = "a227468143354a9b94a7fc607f8b1a7c"

# Analytics Engine binding (optional — enable in Cloudflare dashboard first)
# [[analytics_engine_datasets]]
# binding = "ANALYTICS"
