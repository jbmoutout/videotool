name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            target: aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            target: x86_64-apple-darwin
          - platform: windows-latest
            args: ""
            target: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"

      - name: Import Apple certificate (macOS)
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 12)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import certificate.p12 -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain
          rm certificate.p12

      - name: Install Python dependencies and build CLI binary (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          pip install pyinstaller
          pip install -r requirements-bundle.lock
          pip install -e . --no-deps
          pyinstaller videotool.spec
          cp dist/videotool src-tauri/binaries/videotool-${{ matrix.target }}

      - name: Bundle ffmpeg (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          # Download statically-linked ffmpeg (Homebrew builds are dynamically linked
          # and won't work outside the CI runner)
          if [ "${{ matrix.target }}" = "aarch64-apple-darwin" ]; then
            FFMPEG_URL="https://www.osxexperts.net/ffmpeg71arm.zip"
            FFPROBE_URL="https://www.osxexperts.net/ffprobe71arm.zip"
          else
            FFMPEG_URL="https://www.osxexperts.net/ffmpeg71intel.zip"
            FFPROBE_URL="https://www.osxexperts.net/ffprobe71intel.zip"
          fi
          echo "Downloading static ffmpeg for ${{ matrix.target }}..."
          curl -L "$FFMPEG_URL" -o /tmp/ffmpeg.zip
          curl -L "$FFPROBE_URL" -o /tmp/ffprobe.zip
          unzip -o /tmp/ffmpeg.zip -d /tmp/ffmpeg_bin
          unzip -o /tmp/ffprobe.zip -d /tmp/ffprobe_bin
          cp /tmp/ffmpeg_bin/ffmpeg "src-tauri/binaries/ffmpeg-${{ matrix.target }}"
          cp /tmp/ffprobe_bin/ffprobe "src-tauri/binaries/ffprobe-${{ matrix.target }}"
          chmod +x "src-tauri/binaries/ffmpeg-${{ matrix.target }}" "src-tauri/binaries/ffprobe-${{ matrix.target }}"
          # Verify they're static
          echo "Checking ffmpeg dependencies:"
          otool -L "src-tauri/binaries/ffmpeg-${{ matrix.target }}" | head -5

      - name: Codesign sidecar binaries (macOS)
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          for bin in src-tauri/binaries/*-${{ matrix.target }}; do
            echo "Signing $bin..."
            codesign --force --options runtime --sign "$APPLE_SIGNING_IDENTITY" \
              --entitlements src-tauri/Entitlements.plist "$bin"
            codesign --verify --verbose "$bin"
          done

      - name: Install Python dependencies and build CLI binary (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          pip install pyinstaller
          pip install -r requirements-bundle.lock
          pip install -e . --no-deps
          pyinstaller videotool.spec
          $target = rustc -Vv | Select-String "host:" | ForEach-Object { $_.Line.Split(" ")[1] }
          Copy-Item "dist\videotool.exe" "src-tauri\binaries\videotool-$target.exe"

      - name: Set up Rust target
        if: matrix.platform == 'macos-latest'
        run: rustup target add ${{ matrix.target }}

      - name: Install ffmpeg (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          # Download ffmpeg static build from gyan.dev (no Chocolatey dependency)
          $ffmpegUrl = "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip"
          $zipPath = "$env:TEMP\ffmpeg.zip"
          $extractDir = "$env:TEMP\ffmpeg"
          Write-Host "Downloading ffmpeg from gyan.dev..."
          Invoke-WebRequest -Uri $ffmpegUrl -OutFile $zipPath -UseBasicParsing
          Expand-Archive -Path $zipPath -DestinationPath $extractDir -Force
          # The zip contains a versioned folder like ffmpeg-7.1-essentials_build
          $binDir = Get-ChildItem -Path $extractDir -Recurse -Directory -Filter "bin" | Select-Object -First 1
          if (-not $binDir) { throw "Could not find bin directory in ffmpeg archive" }
          # Add to PATH for subsequent steps
          Write-Host "Adding $($binDir.FullName) to PATH"
          echo "$($binDir.FullName)" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Bundle ffmpeg (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $ffmpeg = (Get-Command ffmpeg).Source
          $ffprobe = (Get-Command ffprobe).Source
          if (-not $ffmpeg -or -not $ffprobe) {
            throw "ffmpeg/ffprobe not found after install"
          }
          $target = rustc -Vv | Select-String "host:" | ForEach-Object { $_.Line.Split(" ")[1] }
          Copy-Item $ffmpeg "src-tauri\\binaries\\ffmpeg-$target.exe"
          Copy-Item $ffprobe "src-tauri\\binaries\\ffprobe-$target.exe"

      - name: Install Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "20"
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release Tauri app
        uses: tauri-apps/tauri-action@fce9c6108b31ea247710505d3aaaa893ee6768d4 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          VITE_API_PROXY_URL: ${{ secrets.VITE_API_PROXY_URL }}
          PROXY_AUTH_TOKEN: ${{ secrets.PROXY_AUTH_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "videotool ${{ github.ref_name }}"
          releaseBody: "See CHANGELOG.md for release notes."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Verify bundled videotool (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          set -euo pipefail
          bundle_root=""
          if [ -n "${{ matrix.target }}" ] && [ -d "src-tauri/target/${{ matrix.target }}/release/bundle/macos" ]; then
            bundle_root="src-tauri/target/${{ matrix.target }}/release/bundle/macos"
          elif [ -d "src-tauri/target/release/bundle/macos" ]; then
            bundle_root="src-tauri/target/release/bundle/macos"
          fi
          if [ -z "$bundle_root" ]; then
            echo "No macOS bundle directory found under src-tauri/target"
            exit 1
          fi

          app_dir=$(ls -d "$bundle_root"/*.app 2>/dev/null | head -n 1 || true)
          if [ -z "$app_dir" ]; then
            echo "No .app bundle found in $bundle_root"
            exit 1
          fi

          search_dirs=(
            "$app_dir/Contents/Resources"
            "$app_dir/Contents/Resources/binaries"
            "$app_dir/Contents/MacOS"
          )

          candidates=""
          for dir in "${search_dirs[@]}"; do
            if [ -d "$dir" ]; then
              found=$(find "$dir" -maxdepth 1 -type f \( -name 'videotool' -o -name 'videotool-*' -o -name 'videotool_*' \) ! -name 'videotool-app*' 2>/dev/null || true)
              if [ -n "$found" ]; then
                candidates="${candidates}"$'\n'"${found}"
              fi
            fi
          done

          if [ -z "$candidates" ]; then
            echo "Bundled videotool binary not found in app bundle"
            exit 1
          fi

          while IFS= read -r bin; do
            [ -z "$bin" ] && continue
            if [ ! -x "$bin" ]; then
              echo "Bundled binary is not executable: $bin"
              exit 1
            fi
          done <<< "$candidates"

      - name: Verify bundled videotool (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          # Find the bundle output directory
          $bundleRoot = Get-ChildItem -Path "src-tauri/target" -Recurse -Directory -Filter "bundle" |
            Where-Object { $_.FullName -match 'release[/\\]bundle$' } |
            Select-Object -First 1
          if (-not $bundleRoot) {
            Write-Host "No bundle directory found — skipping verification"
            exit 0
          }
          Write-Host "Using bundle root: $($bundleRoot.FullName)"
          Write-Host "Bundle contents:"
          Get-ChildItem -Path $bundleRoot.FullName -Recurse -File | ForEach-Object { Write-Host "  $($_.FullName)" }
