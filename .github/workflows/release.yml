name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            target: aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            target: x86_64-apple-darwin
          - platform: windows-latest
            args: ""
            target: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"

      - name: Import Apple certificate (macOS)
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 12)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import certificate.p12 -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain
          rm certificate.p12

      - name: Install Python dependencies and build CLI binary (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          pip install pyinstaller
          pip install -r requirements-bundle.lock
          pip install -e . --no-deps
          pyinstaller videotool.spec
          cp dist/videotool src-tauri/binaries/videotool-${{ matrix.target }}

      - name: Bundle ffmpeg (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          if ! command -v ffmpeg >/dev/null 2>&1; then
            brew install ffmpeg
          fi
          ffmpeg_path="$(command -v ffmpeg)"
          ffprobe_path="$(command -v ffprobe)"
          if [ -z "$ffmpeg_path" ] || [ -z "$ffprobe_path" ]; then
            echo "ffmpeg/ffprobe not found after install"
            exit 1
          fi
          cp "$ffmpeg_path" "src-tauri/binaries/ffmpeg-${{ matrix.target }}"
          cp "$ffprobe_path" "src-tauri/binaries/ffprobe-${{ matrix.target }}"

      - name: Codesign sidecar binaries (macOS)
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          for bin in src-tauri/binaries/*-${{ matrix.target }}; do
            echo "Signing $bin..."
            codesign --force --options runtime --sign "$APPLE_SIGNING_IDENTITY" \
              --entitlements src-tauri/Entitlements.plist "$bin"
            codesign --verify --verbose "$bin"
          done

      - name: Install Python dependencies and build CLI binary (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          pip install pyinstaller
          pip install -r requirements-bundle.lock
          pip install -e . --no-deps
          pyinstaller videotool.spec
          $target = rustc -Vv | Select-String "host:" | ForEach-Object { $_.Line.Split(" ")[1] }
          Copy-Item "dist\videotool.exe" "src-tauri\binaries\videotool-$target.exe"

      - name: Set up Rust target
        if: matrix.platform == 'macos-latest'
        run: rustup target add ${{ matrix.target }}

      - name: Install ffmpeg (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          # Download ffmpeg static build from gyan.dev (no Chocolatey dependency)
          $ffmpegUrl = "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip"
          $zipPath = "$env:TEMP\ffmpeg.zip"
          $extractDir = "$env:TEMP\ffmpeg"
          Write-Host "Downloading ffmpeg from gyan.dev..."
          Invoke-WebRequest -Uri $ffmpegUrl -OutFile $zipPath -UseBasicParsing
          Expand-Archive -Path $zipPath -DestinationPath $extractDir -Force
          # The zip contains a versioned folder like ffmpeg-7.1-essentials_build
          $binDir = Get-ChildItem -Path $extractDir -Recurse -Directory -Filter "bin" | Select-Object -First 1
          if (-not $binDir) { throw "Could not find bin directory in ffmpeg archive" }
          # Add to PATH for subsequent steps
          Write-Host "Adding $($binDir.FullName) to PATH"
          echo "$($binDir.FullName)" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Bundle ffmpeg (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $ffmpeg = (Get-Command ffmpeg).Source
          $ffprobe = (Get-Command ffprobe).Source
          if (-not $ffmpeg -or -not $ffprobe) {
            throw "ffmpeg/ffprobe not found after install"
          }
          $target = rustc -Vv | Select-String "host:" | ForEach-Object { $_.Line.Split(" ")[1] }
          Copy-Item $ffmpeg "src-tauri\\binaries\\ffmpeg-$target.exe"
          Copy-Item $ffprobe "src-tauri\\binaries\\ffprobe-$target.exe"

      - name: Install Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "20"
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release Tauri app
        uses: tauri-apps/tauri-action@fce9c6108b31ea247710505d3aaaa893ee6768d4 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          VITE_API_PROXY_URL: ${{ secrets.VITE_API_PROXY_URL }}
          PROXY_AUTH_TOKEN: ${{ secrets.PROXY_AUTH_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "videotool ${{ github.ref_name }}"
          releaseBody: "See CHANGELOG.md for release notes."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Verify bundled videotool (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          set -euo pipefail
          bundle_root=""
          if [ -n "${{ matrix.target }}" ] && [ -d "src-tauri/target/${{ matrix.target }}/release/bundle/macos" ]; then
            bundle_root="src-tauri/target/${{ matrix.target }}/release/bundle/macos"
          elif [ -d "src-tauri/target/release/bundle/macos" ]; then
            bundle_root="src-tauri/target/release/bundle/macos"
          fi
          if [ -z "$bundle_root" ]; then
            echo "No macOS bundle directory found under src-tauri/target"
            exit 1
          fi

          app_dir=$(ls -d "$bundle_root"/*.app 2>/dev/null | head -n 1 || true)
          if [ -z "$app_dir" ]; then
            echo "No .app bundle found in $bundle_root"
            exit 1
          fi

          search_dirs=(
            "$app_dir/Contents/Resources"
            "$app_dir/Contents/Resources/binaries"
            "$app_dir/Contents/MacOS"
          )

          candidates=""
          for dir in "${search_dirs[@]}"; do
            if [ -d "$dir" ]; then
              found=$(find "$dir" -maxdepth 1 -type f \( -name 'videotool' -o -name 'videotool-*' -o -name 'videotool_*' \) ! -name 'videotool-app*' 2>/dev/null || true)
              if [ -n "$found" ]; then
                candidates="${candidates}"$'\n'"${found}"
              fi
            fi
          done

          if [ -z "$candidates" ]; then
            echo "Bundled videotool binary not found in app bundle"
            exit 1
          fi

          while IFS= read -r bin; do
            [ -z "$bin" ] && continue
            if [ ! -x "$bin" ]; then
              echo "Bundled binary is not executable: $bin"
              exit 1
            fi
          done <<< "$candidates"

      - name: Verify bundled videotool (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $target = rustc -Vv | Select-String "host:" | ForEach-Object { $_.Line.Split(" ")[1] }
          $candidateRoots = @(
            "src-tauri/target/$target/release/bundle",
            "src-tauri/target/release/bundle"
          ) | Where-Object { Test-Path $_ }
          if ($candidateRoots.Count -eq 0) {
            throw "Bundle output not found under src-tauri/target"
          }
          $bundleRoot = $candidateRoots[0]

          Write-Host "Using bundle root: $bundleRoot"

          # 1) Direct search for embedded CLI binaries in portable bundle layouts.
          $direct = Get-ChildItem -Path $bundleRoot -Recurse -File -Filter "videotool*.exe" |
            Where-Object { $_.Name -notlike "videotool-app*" }
          if ($direct -and $direct.Count -gt 0) {
            Write-Host "Found bundled CLI binary on disk:"
            $direct | ForEach-Object { Write-Host "  $($_.FullName)" }
            exit 0
          }

          # 2) Search inside installers/archives if present.
          $installerCandidates = Get-ChildItem -Path $bundleRoot -Recurse -File -Include *.exe,*.msi,*.zip
          if (-not $installerCandidates -or $installerCandidates.Count -eq 0) {
            Write-Host "No installer/archive candidates found under $bundleRoot"
          } else {
            $preferred = $installerCandidates | Where-Object { $_.Name -match '(?i)(setup|installer|nsis|\.msi$|\.zip$)' }
            if (-not $preferred -or $preferred.Count -eq 0) {
              $preferred = $installerCandidates
            }

            $sevenZip = (Get-Command 7z.exe -ErrorAction SilentlyContinue)
            if (-not $sevenZip) { $sevenZip = (Get-Command 7z -ErrorAction SilentlyContinue) }
            if (-not $sevenZip) {
              Write-Host "7zip not available — skipping installer inspection"
              exit 0
            }

            foreach ($archive in $preferred) {
              $files = & $sevenZip.Source l -ba $archive.FullName
              $match = $files | Select-String -Pattern '(?i)videotool(?!-app)[-_a-z0-9]*\.exe'
              if ($match) {
                Write-Host "Found bundled CLI binary inside $($archive.FullName)"
                exit 0
              }
            }
          }

          Write-Host "Bundle root contents:"
          Get-ChildItem -Path $bundleRoot -Depth 2 | ForEach-Object { Write-Host "  $($_.FullName)" }
          throw "Bundled videotool binary not found in bundle output under $bundleRoot"
