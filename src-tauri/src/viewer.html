<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VideoTool — Beat Timeline</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Monaco, "Cascadia Code", "Fira Code", "Courier New", monospace; font-size: 13px; background: #0e0e0e; color: #c9c9c9; padding: 1rem; }

  .top-bar { display: flex; gap: 1rem; margin-bottom: 0.75rem; align-items: center; }
  .top-bar button { font-family: inherit; font-size: 12px; color: #888; background: none; border: 1px solid #333; padding: 0.3rem 0.8rem; cursor: pointer; }
  .top-bar button:hover { color: #c9c9c9; border-color: #666; }
  .top-bar .status { color: #555; }

  video { width: 100%; height: 240px; background: #000; display: block; margin-bottom: 0.5rem; object-fit: contain; }
  video.hidden { display: none; }
  #video-pending { display: none; font-size: 11px; color: #555; padding: 0.5rem 0; margin-bottom: 0.5rem; }
  #video-pending.visible { display: block; }

  .timeline-toolbar { display: flex; align-items: center; gap: 0.4rem; padding: 0.25rem 0; }
  .timeline-toolbar button { font-family: inherit; font-size: 14px; width: 22px; height: 22px; line-height: 20px; text-align: center; color: #666; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 3px; cursor: pointer; padding: 0; }
  .timeline-toolbar button:hover { color: #c9c9c9; border-color: #555; }
  .timeline-toolbar #zoom-label { font-size: 11px; color: #555; min-width: 2.2em; text-align: center; }
  .timeline-toolbar .zoom-hint { font-size: 10px; color: #333; margin-left: 0.4rem; }

  .timeline-wrap { display: flex; margin-bottom: 0.5rem; border: 1px solid #1e1e1e; background: #111; }
  #timeline-labels { width: 240px; flex-shrink: 0; border-right: 1px solid #1a1a1a; }
  .topic-label { height: 28px; display: flex; align-items: center; padding: 0 6px; font-size: 10px; color: #666; border-bottom: 1px solid #1a1a1a; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
  #timeline { flex: 1; overflow-x: auto; }
  #timeline-inner { position: relative; min-width: 100%; }
  .topic-row { position: relative; height: 28px; border-bottom: 1px solid #1a1a1a; }
  .beat { position: absolute; top: 3px; height: 22px; border-radius: 2px; cursor: pointer; opacity: 0.85; transition: opacity 0.1s; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; font-size: 10px; line-height: 22px; padding: 0 4px; color: rgba(0,0,0,0.7); min-width: 2px; }
  .beat:hover { opacity: 1; z-index: 10; }

  /* Content beats */
  .beat[data-type="highlight"]  { background: #c05050; }
  .beat[data-type="core"]       { background: #c0a030; }
  .beat[data-type="context"]    { background: #4080c0; }
  /* Structural beats */
  .beat[data-type="chat"]       { background: #8060c0; }
  .beat[data-type="transition"] { background: #40a060; }
  .beat[data-type="break"]      { background: #333333; }
  /* Legacy fallbacks */
  .beat[data-type="hook"]       { background: #c05050; }
  .beat[data-type="build"]      { background: #4080c0; }
  .beat[data-type="peak"]       { background: #c0a030; }
  .beat[data-type="resolution"] { background: #40a060; }

  #playhead { position: absolute; top: 0; bottom: 0; width: 1px; background: #fff; z-index: 20; pointer-events: none; }

  #hover-info { height: 2.4em; line-height: 2.4em; color: #888; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding: 0 0.25rem; }

  .legend { display: flex; gap: 1rem; margin-bottom: 0.5rem; }
  .legend-item { display: flex; align-items: center; gap: 0.3rem; font-size: 11px; color: #666; }
  .legend-swatch { width: 12px; height: 12px; border-radius: 2px; }
</style>
</head>
<body>

<div class="top-bar">
  <button id="new-btn">[home]</button>
  <span id="status" class="status">loading...</span>
</div>

<video id="player" controls></video>
<div id="video-pending">video downloading in background...</div>

<div class="legend">
  <div class="legend-item"><div class="legend-swatch" style="background:#c05050"></div>highlight</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#c0a030"></div>core</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#4080c0"></div>context</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#8060c0"></div>chat</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#40a060"></div>transition</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#333333"></div>break</div>
</div>

<div class="timeline-toolbar">
  <button id="zoom-out-btn">−</button>
  <span id="zoom-label">1×</span>
  <button id="zoom-in-btn">+</button>
  <span class="zoom-hint">ctrl+scroll to zoom</span>
</div>
<div class="timeline-wrap">
  <div id="timeline-labels"></div>
  <div id="timeline">
    <div id="timeline-inner">
      <div id="playhead"></div>
    </div>
  </div>
</div>

<div id="hover-info">&nbsp;</div>

<script>
const player = document.getElementById("player");
const timeline = document.getElementById("timeline");
const timelineInner = document.getElementById("timeline-inner");
const timelineLabels = document.getElementById("timeline-labels");
const playhead = document.getElementById("playhead");
const hoverInfo = document.getElementById("hover-info");
const status = document.getElementById("status");
const videoPending = document.getElementById("video-pending");

let duration = 0;
let beats = [];
let videoReady = false;
let zoomLevel = 1;

const params = new URLSearchParams(window.location.search);
const beatsOnlyMode = params.get("mode") === "beats-only";

// ── [new] button — navigate back to Svelte app ───────────────────
document.getElementById("new-btn").addEventListener("click", () => {
  const origin = params.get("origin") || "http://localhost:1420";
  // Only allow http(s) URLs to prevent javascript: or data: redirects
  try {
    const url = new URL(origin);
    if (url.protocol === "http:" || url.protocol === "https:" || url.protocol === "tauri:") {
      window.location.href = origin;
    }
  } catch (_) { /* invalid URL — ignore */ }
});

// ── Video loading ─────────────────────────────────────────────────
function enableVideo() {
  if (videoReady) return;
  videoReady = true;
  player.classList.remove("hidden");
  videoPending.classList.remove("visible");
  player.src = "/video";
}

if (beatsOnlyMode) {
  // Hide video, show pending message, poll for video availability
  player.classList.add("hidden");
  videoPending.classList.add("visible");

  const pollInterval = setInterval(async () => {
    try {
      const resp = await fetch("/video", { method: "HEAD" });
      if (resp.ok) {
        clearInterval(pollInterval);
        enableVideo();
      }
    } catch (_) { /* server not ready yet */ }
  }, 5000);
} else {
  // Full mode — load video immediately
  player.src = "/video";
  videoReady = true;
}

player.addEventListener("loadedmetadata", () => {
  duration = player.duration;
  if (beats.length) render();
});

fetch("/beats.json")
  .then(r => r.json())
  .then(data => {
    beats = data.beats || data;
    status.textContent = beats.length + " topics loaded";
    // infer duration from beats if video not loaded yet
    if (!duration) {
      let maxEnd = 0;
      for (const t of beats) {
        for (const b of t.beats) {
          if (b.end_s > maxEnd) maxEnd = b.end_s;
        }
      }
      duration = maxEnd;
    }
    render();
  })
  .catch(err => {
    status.textContent = "Failed to load beats: " + err.message;
    status.style.color = "#c05050";
  });

// ── Rendering ──────────────────────────────────────────────────────
// Base width = the scroll container's viewport (never changes with zoom)
function getBaseW() { return timeline.clientWidth; }

function getContentW() {
  return getBaseW() * zoomLevel;
}

function render() {
  timelineInner.querySelectorAll(".topic-row").forEach(el => el.remove());
  timelineLabels.innerHTML = "";

  if (!duration || !beats.length) return;

  const contentW = getContentW();
  timelineInner.style.width = contentW + "px";

  for (const topic of beats) {
    const label = document.createElement("div");
    label.className = "topic-label";
    label.textContent = topic.topic_label;
    label.title = topic.topic_label;
    timelineLabels.appendChild(label);

    const row = document.createElement("div");
    row.className = "topic-row";

    for (const b of topic.beats) {
      const el = document.createElement("div");
      el.className = "beat";
      el.dataset.type = b.type;
      const left = (b.start_s / duration) * contentW;
      const width = Math.max(2, ((b.end_s - b.start_s) / duration) * contentW);
      el.style.left = left + "px";
      el.style.width = width + "px";
      el.title = `[${b.type}] ${fmtTime(b.start_s)}–${fmtTime(b.end_s)} (${b.confidence})\n${b.label}`;
      el.textContent = b.label;

      el.addEventListener("click", () => {
        if (!videoReady) return;
        player.currentTime = b.start_s;
        if (player.paused && player.src) player.play();
      });
      el.addEventListener("mouseenter", () => {
        hoverInfo.textContent = `[${b.type}] ${fmtTime(b.start_s)}–${fmtTime(b.end_s)} | ${b.label}`;
      });
      el.addEventListener("mouseleave", () => {
        hoverInfo.innerHTML = "&nbsp;";
      });

      row.appendChild(el);
    }

    timelineInner.appendChild(row);
  }
}

// ── Zoom controls ──────────────────────────────────────────────────
const zoomLabel = document.getElementById("zoom-label");
function setZoom(level) {
  const clamped = Math.max(1, Math.min(20, level));
  if (clamped === zoomLevel) return;
  zoomLevel = clamped;
  zoomLabel.textContent = zoomLevel.toFixed(1).replace(/\.0$/, "") + "×";
  if (beats.length) render();
  syncPlayhead();
}
document.getElementById("zoom-in-btn").addEventListener("click", () => setZoom(zoomLevel * 1.5));
document.getElementById("zoom-out-btn").addEventListener("click", () => setZoom(zoomLevel / 1.5));
timeline.addEventListener("wheel", (e) => {
  if (e.ctrlKey || e.metaKey) {
    e.preventDefault();
    const scrollBefore = timeline.scrollLeft;
    const mouseX = e.clientX - timeline.getBoundingClientRect().left + scrollBefore;
    const oldZoom = zoomLevel;
    setZoom(zoomLevel * (e.deltaY < 0 ? 1.2 : 1 / 1.2));
    // keep the point under cursor stable
    const ratio = zoomLevel / oldZoom;
    timeline.scrollLeft = mouseX * ratio - (e.clientX - timeline.getBoundingClientRect().left);
  }
}, { passive: false });

// ── Playhead sync (only runs while playing to save battery) ────────
let rafId = null;
function updatePlayhead() {
  if (duration > 0) {
    playhead.style.left = ((player.currentTime / duration) * getContentW()) + "px";
  }
  rafId = requestAnimationFrame(updatePlayhead);
}
function syncPlayhead() {
  if (duration > 0) {
    playhead.style.left = ((player.currentTime / duration) * getContentW()) + "px";
  }
}
player.addEventListener("play", () => { if (!rafId) updatePlayhead(); });
player.addEventListener("pause", () => { if (rafId) { cancelAnimationFrame(rafId); rafId = null; } syncPlayhead(); });
player.addEventListener("seeked", syncPlayhead);

// ── Click-to-seek on timeline background ───────────────────────────
timeline.addEventListener("click", (e) => {
  if (e.target.classList.contains("beat")) return;
  const rect = timeline.getBoundingClientRect();
  const x = e.clientX - rect.left + timeline.scrollLeft;
  const pct = x / getContentW();
  player.currentTime = pct * duration;
});

// ── Resize handling ────────────────────────────────────────────────
window.addEventListener("resize", () => { if (beats.length) render(); });

// ── Spacebar play/pause ───────────────────────────────────────────
document.addEventListener("keydown", (e) => {
  if (e.code === "Space" && e.target === document.body) {
    e.preventDefault();
    if (player.paused) player.play(); else player.pause();
  }
});

// ── Utils ──────────────────────────────────────────────────────────
function fmtTime(s) {
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return m + ":" + String(sec).padStart(2, "0");
}
</script>
</body>
</html>
