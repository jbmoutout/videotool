<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VodTool — Beat Timeline</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Courier New", monospace; font-size: 13px; background: #0e0e0e; color: #c9c9c9; padding: 1rem; }

  .top-bar { display: flex; gap: 1rem; margin-bottom: 0.75rem; align-items: center; }
  .top-bar button { font-family: inherit; font-size: 12px; color: #888; background: none; border: 1px solid #333; padding: 0.3rem 0.8rem; cursor: pointer; }
  .top-bar button:hover { color: #c9c9c9; border-color: #666; }
  .top-bar .status { color: #555; }

  video { width: 100%; max-height: 45vh; background: #000; display: block; margin-bottom: 0.5rem; }

  #timeline { position: relative; width: 100%; overflow-x: auto; margin-bottom: 0.5rem; border: 1px solid #1e1e1e; background: #111; }
  .topic-row { position: relative; height: 28px; border-bottom: 1px solid #1a1a1a; }
  .topic-label-col { position: absolute; left: 0; top: 0; width: 140px; height: 100%; display: flex; align-items: center; padding: 0 6px; font-size: 10px; color: #666; z-index: 2; background: #111; border-right: 1px solid #1a1a1a; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
  .beat { position: absolute; top: 3px; height: 22px; border-radius: 2px; cursor: pointer; opacity: 0.85; transition: opacity 0.1s; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; font-size: 10px; line-height: 22px; padding: 0 4px; color: rgba(0,0,0,0.7); min-width: 2px; }
  .beat:hover { opacity: 1; z-index: 10; }

  .beat[data-type="hook"]       { background: #c05050; }
  .beat[data-type="build"]      { background: #4080c0; }
  .beat[data-type="peak"]       { background: #c0a030; }
  .beat[data-type="resolution"] { background: #40a060; }

  #playhead { position: absolute; top: 0; bottom: 0; width: 1px; background: #fff; z-index: 20; pointer-events: none; }

  #hover-info { height: 2.4em; line-height: 2.4em; color: #888; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding: 0 0.25rem; }

  .legend { display: flex; gap: 1rem; margin-bottom: 0.5rem; }
  .legend-item { display: flex; align-items: center; gap: 0.3rem; font-size: 11px; color: #666; }
  .legend-swatch { width: 12px; height: 12px; border-radius: 2px; }
</style>
</head>
<body>

<div class="top-bar">
  <button id="new-btn">[new]</button>
  <span id="status" class="status">loading...</span>
</div>

<video id="player" controls></video>

<div class="legend">
  <div class="legend-item"><div class="legend-swatch" style="background:#c05050"></div>hook</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#4080c0"></div>build</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#c0a030"></div>peak</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#40a060"></div>resolution</div>
</div>

<div id="timeline">
  <div id="playhead"></div>
</div>

<div id="hover-info">&nbsp;</div>

<script>
const player = document.getElementById("player");
const timeline = document.getElementById("timeline");
const playhead = document.getElementById("playhead");
const hoverInfo = document.getElementById("hover-info");
const status = document.getElementById("status");

let duration = 0;
let beats = [];
const LABEL_W = 140;

// ── [new] button — navigate back to Svelte app ───────────────────
document.getElementById("new-btn").addEventListener("click", () => {
  const params = new URLSearchParams(window.location.search);
  const origin = params.get("origin") || "http://localhost:1420";
  window.location.href = origin;
});

// ── Auto-load from server ─────────────────────────────────────────
player.src = "/video";

player.addEventListener("loadedmetadata", () => {
  duration = player.duration;
  if (beats.length) render();
});

fetch("/beats.json")
  .then(r => r.json())
  .then(data => {
    beats = data.beats || data;
    status.textContent = beats.length + " topics loaded";
    // infer duration from beats if video not loaded yet
    if (!duration) {
      let maxEnd = 0;
      for (const t of beats) {
        for (const b of t.beats) {
          if (b.end_s > maxEnd) maxEnd = b.end_s;
        }
      }
      duration = maxEnd;
    }
    render();
  })
  .catch(err => {
    status.textContent = "Failed to load beats: " + err.message;
    status.style.color = "#c05050";
  });

// ── Rendering ──────────────────────────────────────────────────────
function render() {
  timeline.querySelectorAll(".topic-row").forEach(el => el.remove());

  if (!duration || !beats.length) return;

  const timelineW = timeline.clientWidth;

  for (const topic of beats) {
    const row = document.createElement("div");
    row.className = "topic-row";

    const label = document.createElement("div");
    label.className = "topic-label-col";
    label.textContent = topic.topic_label;
    label.title = topic.topic_label;
    row.appendChild(label);

    for (const b of topic.beats) {
      const el = document.createElement("div");
      el.className = "beat";
      el.dataset.type = b.type;
      const left = LABEL_W + ((b.start_s / duration) * (timelineW - LABEL_W));
      const width = Math.max(2, ((b.end_s - b.start_s) / duration) * (timelineW - LABEL_W));
      el.style.left = left + "px";
      el.style.width = width + "px";
      el.title = `[${b.type}] ${fmtTime(b.start_s)}–${fmtTime(b.end_s)} (${b.confidence})\n${b.label}`;
      el.textContent = b.label;

      el.addEventListener("click", () => {
        player.currentTime = b.start_s;
        if (player.paused && player.src) player.play();
      });
      el.addEventListener("mouseenter", () => {
        hoverInfo.textContent = `[${b.type}] ${fmtTime(b.start_s)}–${fmtTime(b.end_s)} | ${b.label}`;
      });
      el.addEventListener("mouseleave", () => {
        hoverInfo.innerHTML = "&nbsp;";
      });

      row.appendChild(el);
    }

    timeline.appendChild(row);
  }
}

// ── Playhead sync ──────────────────────────────────────────────────
function updatePlayhead() {
  if (duration > 0) {
    const timelineW = timeline.clientWidth;
    const x = LABEL_W + ((player.currentTime / duration) * (timelineW - LABEL_W));
    playhead.style.left = x + "px";
  }
  requestAnimationFrame(updatePlayhead);
}
requestAnimationFrame(updatePlayhead);

// ── Click-to-seek on timeline background ───────────────────────────
timeline.addEventListener("click", (e) => {
  if (e.target.classList.contains("beat")) return;
  const rect = timeline.getBoundingClientRect();
  const x = e.clientX - rect.left;
  if (x < LABEL_W) return;
  const pct = (x - LABEL_W) / (rect.width - LABEL_W);
  player.currentTime = pct * duration;
});

// ── Resize handling ────────────────────────────────────────────────
window.addEventListener("resize", () => { if (beats.length) render(); });

// ── Utils ──────────────────────────────────────────────────────────
function fmtTime(s) {
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return m + ":" + String(sec).padStart(2, "0");
}
</script>
</body>
</html>
