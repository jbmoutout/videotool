<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="../favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="../favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="../favicon-16x16.png">
<link rel="apple-touch-icon" href="../apple-touch-icon.png">
<title>Stats — VideoTool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0A0A0A;
    --surface: #111111;
    --border: #222222;
    --text: #C9C9C9;
    --text-bright: #FFFFFF;
    --text-muted: #555555;
    --text-dim: #444444;
    --accent: #6B8AFF;
    --success: #4ADE80;
    --warning: #FFB830;
    --error: #FF3B3B;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', Monaco, 'Cascadia Code', 'Fira Code', 'Courier New', monospace;
    font-size: 13px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  .page {
    max-width: 720px;
    margin: 0 auto;
    padding: 48px 24px 96px;
  }

  nav {
    display: flex;
    gap: 24px;
    margin-bottom: 64px;
    font-size: 13px;
  }
  nav a {
    color: var(--text-muted);
    text-decoration: none;
  }
  nav a:hover {
    color: var(--text);
  }

  h2 {
    color: var(--text-bright);
    font-size: 15px;
    font-weight: 500;
    margin-bottom: 16px;
    margin-top: 64px;
  }
  h2:first-of-type {
    margin-top: 0;
  }

  a {
    color: var(--accent);
    text-decoration: none;
  }
  a:hover {
    text-decoration: underline;
  }

  .loading {
    color: var(--text-muted);
  }

  .error {
    color: var(--error);
  }

  /* Stats table */
  .stats-table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 32px;
  }

  .stats-table th {
    text-align: left;
    color: var(--text-muted);
    font-weight: 400;
    font-size: 11px;
    padding: 8px 12px 8px 0;
    border-bottom: 1px solid var(--border);
  }

  .stats-table td {
    padding: 6px 12px 6px 0;
    border-bottom: 1px solid var(--border);
  }

  .stats-table .date {
    color: var(--text);
    width: 120px;
  }

  .stats-table .event {
    color: var(--text-muted);
  }

  .stats-table .count {
    color: var(--text-bright);
    text-align: right;
    width: 60px;
    padding-right: 0;
  }

  .stats-table .empty {
    color: var(--text-dim);
  }

  /* Totals */
  .totals {
    display: flex;
    gap: 32px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }

  .total-item {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .total-value {
    color: var(--text-bright);
    font-size: 15px;
    font-weight: 500;
  }

  .total-label {
    color: var(--text-muted);
    font-size: 11px;
  }

  footer {
    margin-top: 96px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 11px;
  }
  footer a {
    color: var(--text-muted);
  }

  @media (max-width: 600px) {
    .page {
      padding: 32px 16px 64px;
    }
    .totals {
      gap: 24px;
    }
  }
</style>
</head>
<body>
<div class="page">

<nav>
  <a href="../">videotool</a>
  <span>stats</span>
</nav>

<h2>Totals (last 7 days)</h2>
<div id="totals" class="totals">
  <span class="loading">loading...</span>
</div>

<h2>Daily breakdown</h2>
<div id="stats">
  <span class="loading">loading...</span>
</div>

<footer>
  <a href="https://github.com/jbmoutout/videotool">VideoTool</a> — MIT License
</footer>

</div>
<script>
  const API = 'https://vodtool-api.videotool-api.workers.dev';

  fetch(API + '/stats')
    .then(r => r.json())
    .then(data => {
      const dates = Object.keys(data).sort().reverse();

      // Compute totals
      const totals = {};
      dates.forEach(date => {
        const events = data[date];
        Object.entries(events).forEach(([event, count]) => {
          totals[event] = (totals[event] || 0) + count;
        });
      });

      // Render totals
      const totalsEl = document.getElementById('totals');
      if (Object.keys(totals).length === 0) {
        totalsEl.innerHTML = '<span class="empty">no data yet</span>';
      } else {
        totalsEl.innerHTML = Object.entries(totals)
          .sort((a, b) => b[1] - a[1])
          .map(([event, count]) =>
            '<div class="total-item">' +
              '<span class="total-value">' + count + '</span>' +
              '<span class="total-label">' + formatEvent(event) + '</span>' +
            '</div>'
          ).join('');
      }

      // Render daily table
      const statsEl = document.getElementById('stats');
      let html = '<table class="stats-table">';
      html += '<thead><tr><th>date</th><th>event</th><th style="text-align:right">count</th></tr></thead>';
      html += '<tbody>';

      dates.forEach(date => {
        const events = data[date];
        const entries = Object.entries(events);
        if (entries.length === 0) {
          html += '<tr><td class="date">' + date + '</td><td class="event empty">—</td><td class="count empty">0</td></tr>';
        } else {
          entries.forEach(([event, count], i) => {
            html += '<tr>';
            html += '<td class="date">' + (i === 0 ? date : '') + '</td>';
            html += '<td class="event">' + formatEvent(event) + '</td>';
            html += '<td class="count">' + count + '</td>';
            html += '</tr>';
          });
        }
      });

      html += '</tbody></table>';
      statsEl.innerHTML = html;
    })
    .catch(err => {
      document.getElementById('totals').innerHTML = '<span class="error">failed to load stats</span>';
      document.getElementById('stats').innerHTML = '<span class="error">failed to load stats</span>';
    });

  function formatEvent(event) {
    return event.replace(/_/g, ' ');
  }
</script>
</body>
</html>
